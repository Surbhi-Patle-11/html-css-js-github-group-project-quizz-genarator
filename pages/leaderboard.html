<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
</head>

<body>
    <!-- leader board-->

    <div class="container">

        <h1>🏆 Quiz Generator Leaderboard</h1>

        <table>

            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                </tr>
            </thead>

            <tbody id="leaderboardBody">

            </tbody>

        </table>

    </div>

    <!-- Quiz result data -->
    <div class="result-card">

        <div class="trophy">🏆</div>

        <h1>Great Job!</h1>

        <div class="score" id="score">0%</div>

        <div class="stats">

            <div>
                <h2 id="correct">0</h2>
                <p>Correct</p>
            </div>

            <div>
                <h2 id="wrong">0</h2>
                <p>Wrong</p>
            </div>

            <div>
                <h2 id="total">0</h2>
                <p>Total</p>
            </div>

        </div>

        <div class="rank-box">
            <h2 id="rank">#0</h2>
            <p>Your Rank</p>
        </div>

        <button class="btn" onclick="goHome()">
            Back To Home
        </button>

    </div>

    <!-- My Profile data -->

    <script>
        // Leaderboard Logic

        // Demo Players Data

        let players = [
            {
                name: "Rahul",
                score: 950
            },
            {
                name: "Priya",
                score: 900
            },
            {
                name: "Aman",
                score: 850
            }
        ];

        // Current User Data LocalStorage मधून

        let currentUser = JSON.parse(
            localStorage.getItem("user")
        );

        if (currentUser) {

            players.push({
                name: currentUser.name,
                score: currentUser.score || 0
            });

        }

        // Score Descending Sort

        players.sort((a, b) => b.score - a.score);

        let tbody =
            document.getElementById("leaderboardBody");

        // Table Generate

        players.forEach((player, index) => {

            let rank;

            if (index === 0) {
                rank = "🥇";
            }
            else if (index === 1) {
                rank = "🥈";
            }
            else if (index === 2) {
                rank = "🥉";
            }
            else {
                rank = index + 1;
            }

            tbody.innerHTML += `
    <tr>
        <td class="top">${rank}</td>
        <td>${player.name}</td>
        <td>${player.score}</td>
    </tr>
    `;

        });

        //Quiz result data 
        if (!localStorage.getItem("quizResult")) {

            let demoResult = {
                name: "Vishakha",
                correct: 16,
                wrong: 4,
                total: 20
            };

            localStorage.setItem(
                "quizResult",
                JSON.stringify(demoResult)
            );

        }

        let result =
            JSON.parse(localStorage.getItem("quizResult"));

        // Show Quiz Stats

        document.getElementById("correct").innerText =
            result.correct;

        document.getElementById("wrong").innerText =
            result.wrong;

        document.getElementById("total").innerText =
            result.total;

        // Percentage

        let percentage =
            Math.round(
                (result.correct / result.total) * 100
            );

        document.getElementById("score").innerText =
            percentage + "%";

        // Leaderboard Users

        let players = [

            { name: "Rahul", score: 95 },
            { name: "Priya", score: 90 },
            { name: "Aman", score: 85 },
            { name: "Rohit", score: 70 },

            {
                name: result.name,
                score: percentage
            }

        ];

        // Sort Descending

        players.sort((a, b) => b.score - a.score);

        // Find Rank

        let rank =
            players.findIndex(
                player => player.name === result.name
            ) + 1;

        // Show Rank

        document.getElementById("rank").innerText =
            "#" + rank;

        // Button

        function goHome() {
            window.location.href = "index.html";
        }

        //Profile data
    </script>

</body>

</html>
